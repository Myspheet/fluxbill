# FluxBill — app + queue/scheduler worker + Postgres (docs/11 §5).
# Host ports are intentionally non-default to avoid clashing with locally
# running services. No Nomba env is set here — Nomba credentials are populated
# only during the in-window build (1-7 July).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fluxbill
      POSTGRES_PASSWORD: fluxbill
      POSTGRES_DB: fluxbill
    ports:
      - "55432:5432" # non-default host port
    volumes:
      - fluxbill_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxbill"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:5173
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: fluxbill
      DB_USERNAME: fluxbill
      DB_PASSWORD: fluxbill
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: file
    ports:
      - "8080:8000" # non-default host port -> container :8000
    command: >
      sh -c "php artisan key:generate --force &&
             php artisan migrate --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  worker:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: fluxbill
      DB_USERNAME: fluxbill
      DB_PASSWORD: fluxbill
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: file
    # Queue worker (billing/retry jobs) + scheduler (daily sweeps).
    command: >
      sh -c "php artisan schedule:work & php artisan queue:work --tries=3 --backoff=10"

volumes:
  fluxbill_db:
